<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>completar paciente</title>

<style>

	.toast {
    position: fixed;
    top: 20px;
    left: 50%;
    background: #333;
    color: white;
    padding: 16px 24px;
    border-radius: 8px;
    opacity: 0;
    transform: translateX(-50%) translateY(-20px);
    transition: all 0.3s ease;
    font-size: 18px;
    font-family: Arial;
    z-index: 9999;
}

.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

.toast.success {
    background: #28a745;
}

.toast.error {
    background: #dc3545;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0057B8;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.contenedor{
    background:white;
    width:450px;
    padding:35px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#0077b6;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#0077b6;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:#00b4d8;
    transform:scale(1.05);
}

a{
    text-decoration:none;
}

.regresar{
    background:#6c757d;
}

.regresar:hover{
    background:#5a6268;
}
	input2, select{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

</style>
</head>
<body>

<div class="contenedor">

    <h1> COMPLETA EL PERFIL DEL PACIENTE</h1>
	<center>
	  <img src="imagen2/pacien.png" width="225" height="163" alt=""/>
	</center>

    <form id="formPaciente">

        <input type="text" name=apellido_paterno placeholder="Apellido paterno" required>

        <input type="text" name=apellido_materno placeholder="Apellido materno" required>

      <label>Fecha nacimiento</label>
      <input type="date" name="fecha_nacimiento" required>

      	<label>Sexo</label>
     	 <select name="sexo" required>
    		<option>Masculino</option>
    		<option>Femenino</option>
	</select>

    <input type="text" name="curp" placeholder="Curp" required>
		
	<input type="text" name="direccion" placeholder="Direccion" required>
		
	<input type="text" name="codigo_postal" placeholder="Codigo Postal" required>

		<label>Tipo de Sangre</label>
    	<select name="tipo_sangre" required>
    		<option>A+</option>
    		<option>A-</option>
			<option>B+</option>
    		<option>B-</option>
			<option>AB+</option>
    		<option>AB-</option>
			<option>O+</option>
    		<option>O-</option>
		</select>

        <button type="submit">Completar</button>

  </form>

    <br>

    <a href="index.html">
        <button class="regresar">Volver al Inicio</button>
    </a>

</div>

	 <div id="toast" class="toast"></div>

	<script>
function showToast(message, type = "success") {

    const toast = document.getElementById("toast");

    toast.className = "toast";
    toast.textContent = message;

    toast.classList.add("show", type);

    setTimeout(() => {
        toast.classList.remove("show", "success", "error");
    }, 3000);
}
</script>
	
	<script>
document.getElementById("formPaciente").addEventListener("submit", function(e){

    e.preventDefault();

    const datos = new FormData(this);

    fetch("guardar_paciente.php", {
        method: "POST",
        body: datos
    })
    .then(res => res.text())
    .then(data => {

        if(data.trim() === "ok"){

            showToast("Perfil guardado correctamente", "success");

    		setTimeout(() => {
        	window.location.href = "citas.html";
    		}, 2000);

        }else{

            showToast("Error al guardar el perfil", "error");
			console.log(data);

        }

    });

});
</script>

</body>
</html>
