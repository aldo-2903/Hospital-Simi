<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Cuenta - Hospita Similares</title>

<style>

    .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    background: #333;
    color: white;
    padding: 16px 24px;
    border-radius: 8px;
    opacity: 0;
    transform: translateX(-50%) translateY(-20px);
    transition: all 0.3s ease;
    font-size: 18px;
    font-family: Arial;
    z-index: 9999;
}

.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

.toast.success {
    background: #28a745;
}

.toast.error {
    background: #dc3545;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#0a4d8c,#4fa3ff);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.contenedor{
    background:white;
    width:450px;
    padding:35px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#0077b6;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#0077b6;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:#00b4d8;
    transform:scale(1.05);
}

a{
    text-decoration:none;
}

.regresar{
    background:#6c757d;
}

.regresar:hover{
    background:#5a6268;
}

</style>
</head>
<body>

<div class="contenedor">

    <h1>Registrar Cuenta</h1>

    <form id="formUsuario">

        <input type="text" name="nombre" placeholder="Nombre Completo" required>

        <input type="email" name="correo" placeholder="Correo Electrónico" required>

        <input type="password" name="password" placeholder="Contraseña" required>

        <input type="tel" name="telefono" placeholder="Número Telefónico" required>

        <button type="submit">Crear Cuenta</button>

    </form>
    
    <div id="toast" class="toast"></div>
    
    <script>

    function showToast(message, type = "success") {
    const toast = document.getElementById("toast");

    toast.textContent = message;
    toast.className = "toast show " + type;

    setTimeout(() => {
        toast.classList.remove("show");
    }, 6000);
}
document.getElementById("formUsuario").addEventListener("submit", function(e) {
    e.preventDefault();

    const datos = new FormData(this);

    fetch("guardar_usuario.php", {
        method: "POST",
        body: datos
    })
    .then(response => response.text())
    .then(data => {

    if (data.trim() === "ok") {
         showToast("Usuario registrado correctamente", "success");
        document.getElementById("formUsuario").reset();
    } 
    else if (data.includes("correo_duplicado")) {
        showToast("Este correo ya está registrado", "error");
    } 
    else {
        alert("Error: " + data);
    }

});
});
</script>

    <br>

    <a href="index.html">
        <button class="regresar">Volver al Inicio</button>
    </a>

</div>

</body>
</html>
