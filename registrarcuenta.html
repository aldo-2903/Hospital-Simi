<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Cuenta - Hospita Similares</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#0a4d8c,#4fa3ff);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.contenedor{
    background:white;
    width:450px;
    padding:35px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#0077b6;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#0077b6;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:#00b4d8;
    transform:scale(1.05);
}

a{
    text-decoration:none;
}

.regresar{
    background:#6c757d;
}

.regresar:hover{
    background:#5a6268;
}

</style>
</head>
<body>

<div class="contenedor">

    <h1>Registrar Cuenta</h1>

    <form>

        <input type="text" placeholder="Nombre Completo" required>

        <input type="email" placeholder="Correo Electrónico" required>

        <input type="text" placeholder="Usuario" required>

        <input type="password" placeholder="Contraseña" required>

        <input type="password" placeholder="Confirmar Contraseña" required>

        <input type="tel" placeholder="Número Telefónico">

        <button type="submit">Crear Cuenta</button>

    </form>

    <br>

    <a href="index.html">
        <button class="regresar">Volver al Inicio</button>
    </a>

</div>

</body>
</html>
