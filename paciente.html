<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>completar paciente</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;

}

body{

.contenedor{

}

    margin:10px 0;

    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#0077b6;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:#00b4d8;
    transform:scale(1.05);
}

a{
    text-decoration:none;
}

.regresar{
    background:#6c757d;
}

.regresar:hover{
    background:#5a6268;
}
	input2, select{

    margin:8px 0;
    border:1px solid #ccc;

</style>
</head>
<body>
